name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install -g firebase-tools

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy to Hosting
        id: deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release
            firebase deploy --only hosting --token "$FIREBASE_TOKEN" --non-interactive -m "Release ${{ steps.version.outputs.version }}"
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Push to main (untagged)
            firebase deploy --only hosting --token "$FIREBASE_TOKEN" --non-interactive -m "Push to main (v${{ steps.version.outputs.version }})"
          else
            # Preview deploy for pull requests
            RESULT=$(firebase hosting:channel:deploy "pr-${{ github.event.number }}" --token "$FIREBASE_TOKEN" --non-interactive --json)
            URL=$(echo $RESULT | jq -r '.result.hosting.url // empty')
            if [ -z "$URL" ]; then exit 1; fi
            echo "preview_url=$URL" >> $GITHUB_OUTPUT
          fi

      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            if (previewUrl) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 Preview deployment available at: ${previewUrl}`
              });
            }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
